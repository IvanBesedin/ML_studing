stages:
  # ============================================
  # 1. ПОДГОТОВКА ДАННЫХ ADULT
  # ============================================
  prepare_adult:
    cmd: python src/prepare_adult_data.py
    deps:
      - data/raw/adult.csv
      - src/prepare_adult_data.py
    outs:
      - data/processed/adult
      - models/adult_scaler.pkl

  # ============================================
  # 2. ОБУЧЕНИЕ МОДЕЛИ ADULT (ПРЕДОБУЧЕНИЕ)
  # ============================================
  train_adult:
    cmd: python src/train_adult.py
    deps:
      - data/processed/adult
      - src/train_adult.py
      - params.yaml
    outs:
      - models/adult_pretrained.pth
    metrics:
      - metrics/adult_metrics.json:
          cache: false
    params:
      - hidden_sizes
      - dropout_rate
      - batch_size
      - num_epochs
      - learning_rate
      - step_size
      - gamma

  # ============================================
  # 3. ПОДГОТОВКА ДАННЫХ BANK
  # ============================================
  prepare_bank:
    cmd: python src/prepare_bank_data.py
    deps:
      - data/raw/bank.csv
      - src/prepare_bank_data.py
    outs:
      - data/processed/bank
      - models/bank_scaler.pkl

  # ============================================
  # 4. ОБУЧЕНИЕ МОДЕЛИ BANK С 0
  # ============================================
  train_bank_scratch:
    cmd: python src/train_bank_scratch.py
    deps:
      - data/processed/bank
      - src/train_bank_scratch.py
      - params.yaml
    outs:
      - models/bank_from_scratch.pth
    metrics:
      - metrics/bank_scratch_metrics.json:
          cache: false
    params:
      - hidden_sizes
      - dropout_rate
      - batch_size
      - num_epochs
      - learning_rate
      - step_size
      - gamma

  # ============================================
  # 5. FINE-TUNING НА BANK (С ПРЕДОБУЧЕНИЕМ НА ADULT)
  # ============================================
  fine_tune:
    cmd: python src/fine_tune.py
    deps:
      - data/processed/bank
      - models/adult_pretrained.pth
      - src/fine_tune.py
      - params.yaml
    outs:
      - models/bank_finetuned.pth
    metrics:
      - metrics/bank_finetune_metrics.json:
          cache: false
    params:
      - hidden_sizes
      - dropout_rate
      - batch_size
      - fine_tuning_num_epochs
      - fine_tuning_learning_rate
      - fine_tuning_step_size
      - fine_tuning_gamma
      - num_frozen_layers
      - freeze_bn
  # ============================================
  # ЛОГИСТИЧЕСКАЯ РЕГРЕССИЯ
  # ============================================
  train_log_reg:
    cmd: python src/classic_ml/train_log_reg.py
    deps:
      - data/processed/bank
      - src/classic_ml/train_log_reg.py
    outs:
      - models/log_reg.pkl
    metrics:
      - metrics/log_reg_metrics.json:
          cache: false
    params:
      - log_reg

  train_decision_tree:
    cmd: python src/classic_ml/train_decision_tree.py
    deps:
      - data/processed/bank
      - src/classic_ml/train_decision_tree.py
    outs:
      - models/decision_tree.pkl
    metrics:
      - metrics/decision_tree_metrics.json:
          cache: false
    params:
      - decision_tree

  # ============================================
  # ЛОГИСТИЧЕСКАЯ РЕГРЕССИЯ (CROSS-VALIDATION)
  # ============================================
  cv_log_reg:
    cmd: python src/cross_val/cv_log_reg.py
    deps:
      - data/processed/bank
      - src/cross_valcv_log_reg.py
    # 🔧 НЕТ outs — модель не сохраняется!
    metrics:
      - metrics/cv_log_reg_metrics.json:
          cache: false
    params:
      - cv_log_reg


  # ============================================
  # RANDOM FOREST
  # ============================================
  train_random_forest:
    cmd: python src/classic_ml/train_random_forest.py
    deps:
      - data/processed/bank
      - src/classic_ml/train_random_forest.py
    outs:
      - models/random_forest.pkl
    metrics:
      - metrics/random_forest_metrics.json:
          cache: false
    params:
      - random_forest
  
  # ============================================
  # EXTRA TREES
  # ============================================
  train_extra_trees:
    cmd: python src/classic_ml/train_extra_trees.py
    deps:
      - data/processed/bank
      - src/classic_ml/train_extra_trees.py
    outs:
      - models/extra_trees.pkl
    metrics:
      - metrics/extra_trees_metrics.json:
          cache: false
    params:
      - extra_trees
  # ============================================
  # LIGHTGBM
  # ============================================
  train_lightgbm:
    cmd: python src/classic_ml/train_lightgbm.py
    deps:
      - data/processed/bank
      - src/classic_ml/train_lightgbm.py
    outs:
      - models/lightgbm.pkl
    metrics:
      - metrics/lightgbm_metrics.json:
          cache: false
    params:
      - lightgbm
  # ============================================
  # GRADIENT BOOSTING
  # ============================================
  train_gradient_boosting:
    cmd: python src/classic_ml/train_gradient_boosting.py
    deps:
      - data/processed/bank
      - src/classic_ml/train_gradient_boosting.py
    outs:
      - models/gradient_boosting.pkl
    metrics:
      - metrics/gradient_boosting_metrics.json:
          cache: false
    params:
      - gradient_boosting
  # ============================================
  # CATBOOST
  # ============================================
  train_catboost:
    cmd: python src/classic_ml/train_catboost.py
    deps:
      - data/processed/bank
      - src/classic_ml/train_catboost.py
    outs:
      - models/catboost.pkl
    metrics:
      - metrics/catboost_metrics.json:
          cache: false
    params:
      - catboost

  # ============================================
  # BAGGING ENSEMBLE
  # ============================================
  train_bagging:
    cmd: python src/classic_ml/train_bagging.py
    deps:
      - data/processed/bank
      - src/classic_ml/train_bagging.py
    outs:
      - models/bagging.pkl
    metrics:
      - metrics/bagging_metrics.json:
          cache: false
    params:
      - bagging
      - bagging_base_estimator

  train_blending:
    cmd: python src/classic_ml/train_blending.py
    deps:
      - data/processed/bank
      - src/classic_ml/train_blending.py
    outs:
      - models/blending.pkl
    metrics:
      - metrics/blending_metrics.json:
          cache: false
    params:
      - blending
      - blending_linreg
      - blending_des_tree
      - blending_rf
      - blending_extra_trees
      - blending_lgbm
      - blending_grad_boost
      - blending_catboost
      - blending_nb
      - blending_meta_model  
  # ============================================
  # STACKING ENSEMBLE
  # ============================================
  train_stacking:
    cmd: python src/classic_ml/train_stacking.py
    deps:
      - data/processed/bank
      - src/classic_ml/train_stacking.py
    outs:
      - models/stacking.pkl
    metrics:
      - metrics/stacking_metrics.json:
          cache: false
    params:
      - stacking
      - stacking_linreg
      - stacking_des_tree
      - stacking_rf
      - stacking_extra_trees
      - stacking_lgbm
      - stacking_grad_boost
      - stacking_nb
      - stacking_meta_model
