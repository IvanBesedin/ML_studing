# ============================================
# ПАРАМЕТРЫ МОДЕЛИ
# ============================================
hidden_sizes: [64, 32, 16]
dropout_rate: 0.3

# ============================================
# ПАРАМЕТРЫ ОБУЧЕНИЯ (ОБЩИЕ)
# ============================================
batch_size: 64
num_epochs: 50
learning_rate: 0.001
step_size: 30
gamma: 0.1

# ============================================
# ПАРАМЕТРЫ FINE-TUNING
# ============================================
fine_tuning_num_epochs: 30
fine_tuning_learning_rate: 0.0005
fine_tuning_step_size: 30
fine_tuning_gamma: 0.1
num_frozen_layers: 1
freeze_bn: true

# ============================================
# ПАРАМЕТРЫ ДЛЯ BANK (ОБУЧЕНИЕ С 0)
# ============================================
hidden_sizes_bank: [32, 16, 8]
dropout_rate_bank: 0.3
batch_size_bank: 64
num_epochs_bank: 30
learning_rate_bank: 0.001
step_size_bank: 30
gamma_bank: 0.1

# ============================================
# ОБЩИЕ ПАРАМЕТРЫ
# ============================================
random_state: 42
test_size: 0.2
cv_splits: 5

# ============================================
# ЛОГИСТИЧЕСКАЯ РЕГРЕССИЯ
# ============================================
log_reg:
  max_iter: 1000
  random_state: 42
  class_weight: "balanced"
  solver: "lbfgs"
  penalty: "l2"
  C: 1.0
  tol: 0.0001
  
decision_tree:
  max_depth: 10
  min_samples_split: 20
  min_samples_leaf: 10
  random_state: 42
  class_weight: "balanced"
  criterion: "gini"
  splitter: "best"
  max_features: null
  min_impurity_decrease: 0.0

random_forest:
  n_estimators: 200
  max_depth: 15
  min_samples_split: 20
  min_samples_leaf: 10
  random_state: 42
  class_weight: "balanced"
  n_jobs: -1
  bootstrap: true
  criterion: "gini"
  max_features: "sqrt"